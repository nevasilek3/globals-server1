services:
  - type: web
    name: telegram-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        scope: run
      - key: DATABASE_URL
        scope: run
      - key: RENDER_EXTERNAL_URL
        scope: run
        value: https://telegram-bot.onrender.com
